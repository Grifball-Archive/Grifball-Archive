# Reading experience similar to GitBook wikis (e.g. https://wiki.thescriptersguild.com/).
# Hosted on GitHub Pages; content = Markdown under docs/.
site_name: Grifball Archive
# Shown in <meta name="description">, Open Graph / Discord link previews, and search — not the main body of docs/index.md.
site_description: A place for all Grifball archives. Articles, stats, sheets, images, and videos. This repository is for browsing and preservation.
site_url: https://grifball-archive.github.io/Grifball-Archive/

repo_url: https://github.com/Grifball-Archive/Grifball-Archive
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# Must be top-level — MkDocs injects these into pages; theme.extra_css is not applied.
extra_css:
  - stylesheets/extra.css

# Raw image URL for homepage link previews (Discord, etc.). Must match the <img> in docs/index.md.
extra:
  homepage_preview: assets/images/grifball-archive-hero.png

theme:
  name: material
  custom_dir: overrides
  logo: assets/images/Assault_Icon.jpg
  favicon: assets/images/Assault_Icon.jpg
  palette:
    - scheme: default
      primary: blue
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: red
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    # Instant + sticky tabs can leave duplicate / stale tab rows in the header after
    # nav changes or fast clicks; full reloads keep the top bar consistent.
    # - navigation.instant
    - navigation.tracking
    # Top-level groups (Historical record, Articles, …) become tabs under the header;
    # the left sidebar only lists pages inside the active tab — much less clutter.
    - navigation.tabs
    # Renders tabs inside the header so they stay visible while scrolling.
    # (Previously paired with navigation.instant; instant is off to avoid duplicate/stale tab rows.)
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.action.edit
    - toc.follow

plugins:
  - search
  # PNG preview cards per page (og:image). CairoSVG needs native Cairo; GitHub Actions sets CI=true
  # and the workflow installs libcairo. Local Windows/macOS: omit CI or set CI=false to skip (see Material imaging docs).
  - social:
      enabled: !ENV [CI, false]
      # Welcome uses a raw hero for og:image (overrides/main.html), not a generated card.
      cards_exclude:
        - index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

nav:
  - Welcome: index.md
  - Historical Record:
      - Overview: history/overview.md
      - Timeline (stub): history/timeline.md
  - Articles:
      - Overview: articles/overview.md
      - About this archive: articles/about-the-archive.md
  - Stats and Sheets:
      - Overview: statistics/overview.md
  - Webpages:
      - Overview: webpages/overview.md
  - Video Library:
      - Overview: video/overview.md
  - Image Library:
      - Overview: image-library/overview.md
  - "Misc/Uncategorized":
      - Overview: misc/overview.md
  - Contributing:
      - Submitting materials: contributing/submitting-materials.md
